<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>IPTV PRO - Telyy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- HLS Player -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    header {
      padding: 15px;
      background: #111;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #00f2ff;
    }

    #container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 40%;
      background: black;
    }

    #channels {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .channel {
      padding: 12px;
      margin: 6px 0;
      background: #1a1a1a;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .channel:hover {
      background: #00f2ff;
      color: black;
    }

    .group {
      margin-top: 15px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

<header>📺 IPTV PRO - Telyy</header>

<div id="container">

  <video id="video" controls autoplay></video>

  <div id="channels"></div>

</div>

<script>
const video = document.getElementById('video');

function playStream(url) {
  if (Hls.isSupported()) {
    if (window.hls) window.hls.destroy();

    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    window.hls = hls;
  } else {
    video.src = url;
  }
}

const channelList = [
  {group: "ABERTOS BR", name: "TV Brasil", url: "https://tvbrasil-stream.ebc.com.br/index.m3u8"},
  {group: "ABERTOS BR", name: "TV Cultura", url: "https://player-tvcultura.stream.uol.com.br/live/tvcultura.m3u8"},
  {group: "ABERTOS BR", name: "TV Pampa", url: "https://video04.logicahost.com.br/tvpampa/tvpampa/playlist.m3u8"},
  {group: "ABERTOS BR", name: "Rede Brasil", url: "https://video09.logicahost.com.br/redebrasiloficial/redebrasiloficial/chunklist_w889795232.m3u8"},
  {group: "ABERTOS BR", name: "TV Litoral", url: "https://srv2.tvmais.net.br/hls/tvlitoral/1_0/index.m3u8"},

  {group: "FILMES", name: "MyTime Movies", url: "https://appletree-mytime-samsungbrazil.amagi.tv/playlist720p.m3u8"},
  {group: "FILMES", name: "Movie Channel", url: "https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/b89cc37caa6d418eb423cf092a2ef970/index_4.m3u8"},

  {group: "ESPORTES", name: "Sports Channel", url: "https://amg16379-sports7-amg16379c2-tcl-us-4436.playouts.now.amagi.tv/playlist576p.m3u8"},

  {group: "VARIEDADES", name: "Amazon Sat", url: "https://cdn-tiva-amazonsat-brasilstream-com-br.smartbit.co/hls/amazonsat/index.m3u8"},
  {group: "VARIEDADES", name: "ISTV Nacional", url: "https://video08.logicahost.com.br/istvnacional/srt.stream/chunklist_w1391380570.m3u8"},
  {group: "VARIEDADES", name: "TV Max", url: "https://video09.logicahost.com.br/tvmax/tvmax/playlist.m3u8"},
  {group: "VARIEDADES", name: "GBS Studio", url: "https://video05.logicahost.com.br/gbsstudio/gbsstudio/chunklist_w799634015.m3u8"},
];

const container = document.getElementById('channels');

let currentGroup = "";

channelList.forEach(ch => {
  if (ch.group !== currentGroup) {
    currentGroup = ch.group;

    const groupTitle = document.createElement('div');
    groupTitle.className = "group";
    groupTitle.innerText = currentGroup;
    container.appendChild(groupTitle);
  }

  const div = document.createElement('div');
  div.className = "channel";
  div.innerText = ch.name;

  div.onclick = () => playStream(ch.url);

  container.appendChild(div);
});

// autoplay primeiro canal
playStream(channelList[0].url);
</script>

</body>
</html>
